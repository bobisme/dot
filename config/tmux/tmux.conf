set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc" # true color support
set -ga terminal-overrides ',*:RGB' # Enable 24 bit true colors
set -ga terminal-overrides ',*:S'
# Explicitly set mouse enable sequence for xterm-ghostty (not auto-detected)
set -ga terminal-overrides ",xterm-ghostty:XM=\\E[?1006;1000%?%p1%{1}%=%th%el%;"

set -g mouse on
set -g focus-events on

# Better modified-key passthrough for terminal apps (pi, helix, etc.)
set -g xterm-keys on
set -g extended-keys on
set -g extended-keys-format csi-u
set -ga terminal-features ",xterm*:extkeys"

# Click on pane to select it; don't pass through (send-keys -M breaks fish mouse)
bind -n MouseDown1Pane select-pane -t =
bind -n DoubleClick1Pane select-pane -t =
bind -n MouseDown1Status select-window -t =
bind -n MouseDrag1Border resize-pane -M

set-option -g history-limit 100000

# Remap prefix brom Ctrl+b to Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Number windows from 1 instead of 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# connecting big and small screens
set-window-option -g aggressive-resize

# Shift+Alt+{h,l} to cycle windows
bind -n M-H previous-window
bind -n M-L next-window

# Ctrl+Shift+Arrow to move between windows
bind -n C-S-Left previous-window
bind -n C-S-Right next-window

# Ctrl+Arrow to move between panes
bind -n C-Left select-pane -L
bind -n C-Right select-pane -R
bind -n C-Up select-pane -U
bind -n C-Down select-pane -D

# Easier, vi-like selection
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
# bind-key -T copy-mode-vi C-k send-keys -N 10 -X cursor-up

# open splits in current dir
bind _ split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'slanted'
set -g @catppuccin_window_default_text " #{window_name}"
set -g @catppuccin_window_current_text " #{window_name}"
set -g @catppuccin_window_text " #{window_name}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
# set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
# set -ag status-right "#{E:@catppuccin_status_uptime}"
# set -agF status-right "#{E:@catppuccin_status_battery}"

# from # from # from set -g @plugin 'christoomey/vim-tmux-navigator'
version_pat='s/^tmux[^0-9]*([.0-9]+).*/\1/p'

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"
is_vim_or_helix="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|helix|hx)(diff)?$'"

# Pane navigation with prefix (no root-level C-h/j/k/l to avoid conflicts)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Ctrl+Shift+j/k for up/down pane navigation (matching ghostty config)
bind -n C-S-j select-pane -D
bind -n C-S-k select-pane -U

tmux_version="$(tmux -V | sed -En "$version_pat")"
setenv -g tmux_version "$tmux_version"

#echo "{'version' : '${tmux_version}', 'sed_pat' : '${version_pat}' }" > ~/.tmux_version.json

if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
  "bind-key -n 'C-\\' if-shell \"$is_vim_or_helix\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
  "bind-key -n 'C-\\' if-shell \"$is_vim_or_helix\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi C-H select-pane -L
bind-key -T copy-mode-vi C-J select-pane -D
bind-key -T copy-mode-vi C-K select-pane -U
bind-key -T copy-mode-vi C-L select-pane -R
bind-key -T copy-mode-vi C-\\ select-pane -l

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
